# LiteLLM proxy config — Claude Code -> GitHub Copilot backend.
#
# Routes Claude requests through the github_copilot provider directly. Its
# GithubCopilotMessagesConfig serves Copilot's native /v1/messages endpoint and
# handles the Copilot bearer/editor-header auth + token refresh itself — no
# copilot_auth callback needed (the anthropic/ + manual-callback hack is gone).
#
# Requires the patched litellm base image carrying GithubCopilotMessagesConfig.

model_list:
  # --- Opus 4.8 (Claude Code default + the [1m] long-context variant) ---
  - model_name: claude-opus-4.8
    litellm_params:
      model: github_copilot/claude-opus-4.8
  - model_name: "claude-opus-4.8[1m]"
    litellm_params:
      model: github_copilot/claude-opus-4.8
  - model_name: claude-opus-4-8
    litellm_params:
      model: github_copilot/claude-opus-4.8

  # --- Sonnet 4.6 ---
  - model_name: claude-sonnet-4.6
    litellm_params:
      model: github_copilot/claude-sonnet-4.6
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: github_copilot/claude-sonnet-4.6

  # --- Haiku 4.5 ---
  - model_name: claude-haiku-4.5
    litellm_params:
      model: github_copilot/claude-haiku-4.5
  - model_name: claude-haiku-4-5
    litellm_params:
      model: github_copilot/claude-haiku-4.5

# Web search via LiteLLM's websearch_interception, now enabled for the
# github_copilot provider (the native path runs through the agentic loop).
search_tools:
  - search_tool_name: "tavily-search"
    litellm_params:
      search_provider: "tavily"

litellm_settings:
  drop_params: true
  # No copilot_auth callback — the github_copilot provider handles auth itself.
  callbacks: ["websearch_interception"]
  websearch_interception_params:
    enabled_providers: ["github_copilot"]
    search_tool_name: "tavily-search"

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
