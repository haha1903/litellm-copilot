# LiteLLM proxy config — Claude Code -> GitHub Copilot backend.
#
# Claude Code sends Anthropic Messages API requests (/v1/messages) with model
# names like "claude-opus-4.8[1m]" / "claude-sonnet-4.6". LiteLLM translates
# those to the github_copilot/* provider and back to Anthropic SSE events.
#
# model_name is what Claude Code asks for (left side / wildcard).
# litellm_params.model is the real Copilot backend model (right side).

model_list:
  # --- Opus 4.8 (Claude Code default + the [1m] long-context variant) ---
  - model_name: claude-opus-4.8
    litellm_params:
      model: github_copilot/claude-opus-4.8
  - model_name: "claude-opus-4.8[1m]"
    litellm_params:
      model: github_copilot/claude-opus-4.8
  - model_name: claude-opus-4-8
    litellm_params:
      model: github_copilot/claude-opus-4.8

  # --- Sonnet 4.6 ---
  - model_name: claude-sonnet-4.6
    litellm_params:
      model: github_copilot/claude-sonnet-4.6
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: github_copilot/claude-sonnet-4.6

  # --- Haiku 4.5 (Claude Code uses it for cheap background tasks) ---
  - model_name: claude-haiku-4.5
    litellm_params:
      model: github_copilot/claude-haiku-4.5
  - model_name: claude-haiku-4-5
    litellm_params:
      model: github_copilot/claude-haiku-4.5

  # --- Catch-all: any other claude-* name maps straight through ---
  - model_name: "claude-*"
    litellm_params:
      model: github_copilot/*

litellm_settings:
  # Surface backend errors instead of silently swallowing them.
  drop_params: true

general_settings:
  # Proxy access control. Clients must send this key as their Anthropic auth
  # token (x-api-key / ANTHROPIC_AUTH_TOKEN). Injected from the environment so
  # the secret never lives in the image or the repo. Must start with "sk-".
  master_key: os.environ/LITELLM_MASTER_KEY
